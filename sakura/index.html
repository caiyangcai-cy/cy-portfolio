<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>百变小樱魔法卡 - 手势召唤系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 加载画面 -->
  <div id="loading-screen">
    <div class="magic-circle-loader">
      <div class="circle outer"></div>
      <div class="circle inner"></div>
      <div class="star">✦</div>
    </div>
    <p class="loading-text">正在加载魔法系统…</p>
    <p class="loading-sub" id="loading-status">初始化中</p>
  </div>

  <!-- 主界面 -->
  <div id="app" class="hidden">
    <!-- 摄像头画面（镜像翻转） -->
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="camera-overlay"></canvas>

    <!-- 手势提示 -->
    <div id="gesture-hint">
      <div class="hint-icon">✊</div>
      <div class="hint-text">张开手掌，召唤卡牌</div>
    </div>

    <!-- 状态标签 -->
    <div id="state-badge">待命</div>

    <!-- 魔法阵背景（复杂几何SVG） -->
    <div id="magic-circle-bg" class="hidden">
      <svg id="magic-circle-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="glow-strong">
            <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <!-- 金色渐变 -->
          <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8"/>
            <stop offset="50%" style="stop-color:#ffaa00;stop-opacity:0.6"/>
            <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.8"/>
          </linearGradient>
        </defs>

        <!-- 外圆 (半径250px -> viewBox中为250) -->
        <circle cx="300" cy="300" r="250" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" filter="url(#glow)" opacity="0.7"/>
        
        <!-- 外圆装饰纹 -->
        <circle cx="300" cy="300" r="245" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="1" stroke-dasharray="8 4"/>
        <circle cx="300" cy="300" r="255" fill="none" stroke="rgba(255,215,0,0.15)" stroke-width="0.8" stroke-dasharray="3 6"/>

        <!-- 五角星 -->
        <polygon 
          points="300,65 356,195 495,195 380,275 420,405 300,330 180,405 220,275 105,195 244,195"
          fill="none" stroke="rgba(255,215,0,0.5)" stroke-width="1.8" filter="url(#glow)" opacity="0.6"/>
        
        <!-- 内部倒五角星 -->
        <polygon 
          points="300,405 244,275 105,275 220,195 180,65 300,145 420,65 380,195 495,275 356,275"
          fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="1" opacity="0.4"/>

        <!-- 中心圆 -->
        <circle cx="300" cy="300" r="120" fill="none" stroke="rgba(255,215,0,0.35)" stroke-width="1.5" filter="url(#glow)"/>
        <circle cx="300" cy="300" r="80" fill="none" stroke="rgba(255,215,0,0.25)" stroke-width="1"/>

        <!-- 内部小五角星 -->
        <polygon 
          points="300,185 323,253 395,253 337,293 355,360 300,325 245,360 263,293 205,253 277,253"
          fill="none" stroke="rgba(255,215,0,0.4)" stroke-width="1.2" filter="url(#glow)" opacity="0.5"/>

        <!-- 左侧新月图案 -->
        <g opacity="0.55" filter="url(#glow)">
          <!-- 新月外弧 -->
          <path d="M 130,300 A 80,80 0 1,1 130,300.01" fill="none" stroke="rgba(255,215,0,0.5)" stroke-width="1.5"
                transform="translate(-5,0)"/>
          <!-- 新月内弧（裁切出新月形状） -->
          <path d="M 110,235 A 65,80 0 0,1 110,365" fill="none" stroke="rgba(255,215,0,0.4)" stroke-width="1.2"/>
          <!-- 新月填充 -->
          <path d="M 125,220 A 80,80 0 0,1 125,380 A 55,80 0 0,0 125,220 Z" 
                fill="rgba(255,215,0,0.06)" stroke="rgba(255,215,0,0.35)" stroke-width="1"/>
        </g>

        <!-- 右侧太阳图案 -->
        <g opacity="0.55" filter="url(#glow)">
          <!-- 太阳中心 -->
          <circle cx="470" cy="300" r="30" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.5)" stroke-width="1.5"/>
          <circle cx="470" cy="300" r="20" fill="rgba(255,215,0,0.05)" stroke="rgba(255,215,0,0.3)" stroke-width="1"/>
          <!-- 太阳光芒 -->
          <line x1="470" y1="260" x2="470" y2="245" stroke="rgba(255,215,0,0.5)" stroke-width="1.5"/>
          <line x1="470" y1="340" x2="470" y2="355" stroke="rgba(255,215,0,0.5)" stroke-width="1.5"/>
          <line x1="430" y1="300" x2="415" y2="300" stroke="rgba(255,215,0,0.5)" stroke-width="1.5"/>
          <line x1="510" y1="300" x2="525" y2="300" stroke="rgba(255,215,0,0.5)" stroke-width="1.5"/>
          <!-- 对角光芒 -->
          <line x1="441" y1="271" x2="430" y2="260" stroke="rgba(255,215,0,0.4)" stroke-width="1.2"/>
          <line x1="499" y1="271" x2="510" y2="260" stroke="rgba(255,215,0,0.4)" stroke-width="1.2"/>
          <line x1="441" y1="329" x2="430" y2="340" stroke="rgba(255,215,0,0.4)" stroke-width="1.2"/>
          <line x1="499" y1="329" x2="510" y2="340" stroke="rgba(255,215,0,0.4)" stroke-width="1.2"/>
          <!-- 波浪形光芒 -->
          <circle cx="470" cy="300" r="42" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="1" stroke-dasharray="5 3"/>
        </g>

        <!-- 复杂连接线条 - 对角线 -->
        <line x1="115" y1="115" x2="485" y2="485" stroke="rgba(255,215,0,0.1)" stroke-width="0.8"/>
        <line x1="485" y1="115" x2="115" y2="485" stroke="rgba(255,215,0,0.1)" stroke-width="0.8"/>
        <line x1="300" y1="50" x2="300" y2="550" stroke="rgba(255,215,0,0.08)" stroke-width="0.8"/>
        <line x1="50" y1="300" x2="550" y2="300" stroke="rgba(255,215,0,0.08)" stroke-width="0.8"/>
        
        <!-- 连接新月和太阳的弧线 -->
        <path d="M 160,230 Q 300,180 440,230" fill="none" stroke="rgba(255,215,0,0.15)" stroke-width="0.8"/>
        <path d="M 160,370 Q 300,420 440,370" fill="none" stroke="rgba(255,215,0,0.15)" stroke-width="0.8"/>
        
        <!-- 外圈装饰符文圆点 -->
        <circle cx="300" cy="55" r="4" fill="rgba(255,215,0,0.4)" filter="url(#glow)"/>
        <circle cx="300" cy="545" r="4" fill="rgba(255,215,0,0.4)" filter="url(#glow)"/>
        <circle cx="55" cy="300" r="4" fill="rgba(255,215,0,0.4)" filter="url(#glow)"/>
        <circle cx="545" cy="300" r="4" fill="rgba(255,215,0,0.4)" filter="url(#glow)"/>
        
        <!-- 中间层装饰 -->
        <circle cx="300" cy="300" r="180" fill="none" stroke="rgba(255,215,0,0.12)" stroke-width="1" stroke-dasharray="6 10"/>

        <!-- 符文标记 (12个位置) -->
        <g opacity="0.3" filter="url(#glow)">
          <circle cx="300" cy="70" r="3" fill="#ffd700"/>
          <circle cx="419" cy="118" r="3" fill="#ffd700"/>
          <circle cx="488" cy="225" r="3" fill="#ffd700"/>
          <circle cx="488" cy="375" r="3" fill="#ffd700"/>
          <circle cx="419" cy="482" r="3" fill="#ffd700"/>
          <circle cx="300" cy="530" r="3" fill="#ffd700"/>
          <circle cx="181" cy="482" r="3" fill="#ffd700"/>
          <circle cx="112" cy="375" r="3" fill="#ffd700"/>
          <circle cx="112" cy="225" r="3" fill="#ffd700"/>
          <circle cx="181" cy="118" r="3" fill="#ffd700"/>
        </g>

        <!-- 中心小装饰 -->
        <circle cx="300" cy="300" r="5" fill="rgba(255,215,0,0.5)" filter="url(#glow-strong)"/>
      </svg>
    </div>

    <!-- 圆形排列卡牌区域 -->
    <div id="carousel-stage" class="hidden">
      <div id="carousel-wrapper">
        <div id="carousel">
          <!-- 10张卡牌由 JS 动态生成 -->
        </div>
      </div>
    </div>

    <!-- 选定卡牌放大展示（食指选定） -->
    <div id="card-selected-view" class="hidden">
      <div class="selected-magic-circle">
        <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="sel-glow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(255,215,0,0.35)" stroke-width="2" filter="url(#sel-glow)"/>
          <circle cx="200" cy="200" r="160" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="1"/>
          <polygon points="200,30 270,110 270,290 200,370 130,290 130,110"
                   fill="none" stroke="rgba(255,215,0,0.15)" stroke-width="1"/>
          <circle cx="200" cy="200" r="130" fill="none" stroke="rgba(255,215,0,0.25)" stroke-width="1.5"/>
          <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(255,215,0,0.12)" stroke-width="1" stroke-dasharray="3 6"/>
        </svg>
      </div>
      <div class="selected-glow" id="selected-glow"></div>
      <div class="selected-card" id="selected-card"></div>
      <div class="selected-card-name" id="selected-card-name"></div>
      <div class="selected-hint">✌️ 双指指着释放魔法 · ✋ 张开手掌取消</div>
    </div>

    <!-- 3D翻转展示（双指指着触发） -->
    <div id="flip-card-display" class="hidden">
      <div class="card-3d-wrapper">
        <div class="card-3d">
          <div class="card-front" id="flip-card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>
      <div class="flip-card-name" id="flip-card-name"></div>
      <div class="flip-card-hint">✌️ 再次双指指着释放魔法 · ✋ 取消</div>
    </div>

    <!-- 魔法特效层 -->
    <canvas id="fx-canvas"></canvas>

    <!-- 粒子特效层 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 调试面板 -->
    <div id="debug-panel" class="hidden">
      <div class="debug-header">
        <span>🔍 调试面板</span>
        <button id="debug-close">✕</button>
      </div>
      <canvas id="debug-canvas" width="320" height="240"></canvas>
      <div id="debug-info">
        <div>手势: <span id="dbg-gesture">无</span></div>
        <div>状态: <span id="dbg-state">idle</span></div>
        <div>手数: <span id="dbg-hands">0</span></div>
        <div>FPS: <span id="dbg-fps">0</span></div>
        <div>置信度: <span id="dbg-confidence">0</span></div>
      </div>
    </div>

    <!-- 底部工具栏 -->
    <div id="toolbar">
      <button id="btn-debug" title="调试面板">🔍</button>
      <button id="btn-mirror" title="镜像翻转">🪞</button>
      <button id="btn-sound" title="音效开关">🔊</button>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="cards.js"></script>
  <script src="gestures.js"></script>
  <script src="effects.js"></script>
  <script src="app.js"></script>
  <script type="module" src="bootstrap.js"></script>
</body>
</html>
